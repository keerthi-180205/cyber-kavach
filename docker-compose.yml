services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber-kavach-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/alerts.json:/app/alerts.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber-kavach-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: cyber-kavach-agent
    network_mode: "host"
    pid: "host"            # ← Required: lets psutil see ALL host processes
    privileged: true       # ← Required: lets os.kill work across namespaces
    env_file:
      - .env
    environment:
      # Override BACKEND_URL — agent uses host network so must use localhost, not Docker DNS
      - BACKEND_URL=http://localhost:8000
    volumes:
      # Mount host logs for real monitoring
      - /var/log:/var/log:ro
      # Mount blacklist live — changes take effect within 10s (no rebuild needed)
      - ./agent/blacklist.txt:/app/blacklist.txt:ro
    depends_on:
      - backend
    restart: unless-stopped
    # Required for iptables (response actions)
    cap_add:
      - NET_ADMIN
