services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber-kavach-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/alerts.json:/app/alerts.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber-kavach-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: cyber-kavach-agent
    network_mode: "host"
    env_file:
      - .env
    volumes:
      # Mount host logs for real monitoring
      - /var/log:/var/log:ro
    depends_on:
      - backend
    restart: unless-stopped
    # Required for iptables (response actions)
    cap_add:
      - NET_ADMIN
